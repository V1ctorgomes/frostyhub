<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — FrostyHub</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="login-page" data-page="login">
    <div class="login-card">
      <header class="login-card__header">
        <div class="logo">
          <img
            src="../assets/logo/logo.svg"
            alt=""
            class="logo__icon"
            width="48"
            height="48"
          />
          <span class="logo__text">FrostyHub</span>
        </div>
        <p class="login-card__subtitle">Acesse sua conta para continuar</p>
      </header>

      <form id="login-form" class="login-form" novalidate>
        <div id="login-error" class="login-form__error" role="alert" hidden></div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="seu@email.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" id="login-btn" class="btn btn--primary">
          Entrar
        </button>
      </form>
    </div>

    <div id="loading" class="loading-overlay" hidden>
      <div class="spinner" role="status" aria-label="Carregando"></div>
    </div>

    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
